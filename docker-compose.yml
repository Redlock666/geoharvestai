version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./ml/artifacts:/app/ml/artifacts
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geoharvestai
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo} -d geoharvestai"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: geoharvestai_ts
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data
      - ./db/timescale_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo} -d geoharvestai_ts"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
    command: python scripts/daily_refresh.py
    volumes:
      - ./ml/artifacts:/app/ml/artifacts
    restart: unless-stopped

volumes:
  postgis_data:
  timescale_data:
